<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1.0,maximum-scale=1.0" />
		<title>svgmapjs demo (basic / no extensions)</title>
		<style>
			html,
			body {
				width: 100%;
				height: 100%;
				margin: 0;
				overflow: hidden;
				background: #ffffff;
			}
			#mapcanvas {
				position: absolute;
				left: 0;
				top: 0;
				right: 0;
				bottom: 0;
			}
			#gui {
				position: absolute;
				left: 8px;
				top: 8px;
				z-index: 10;
				user-select: none;
			}
			#gui button {
				display: block;
				margin: 0 0 6px;
				padding: 6px 8px;
				font-size: 12px;
			}
			#error {
				position: absolute;
				left: 8px;
				top: 120px;
				max-width: min(900px, calc(100vw - 16px));
				max-height: min(60vh, calc(100vh - 128px));
				overflow: auto;
				font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
				font-size: 12px;
				white-space: pre-wrap;
				color: #991b1b;
				background: rgba(255, 255, 255, 0.95);
				border: 1px solid rgba(0, 0, 0, 0.15);
				border-radius: 8px;
				padding: 8px 10px;
				display: none;
				z-index: 20;
			}
		</style>
		<script type="importmap">
			{
				"imports": {
					"@penguings/svgmapjs": "../../../packages/svgmap/src/index.js",
					"@penguings/svgmapjs-gis": "../../../node_modules/@penguings/svgmapjs-gis/src/index.js"
				}
			}
		</script>
		<script type="module">
			import { SvgMap } from "../../../packages/svgmap/src/index.js";

			try {
				const svgMap = new SvgMap();
				window.svgMap = svgMap;
			} catch (e) {
				console.error(e);
			}
		</script>
	</head>
	<body>
		<div id="mapcanvas" data-src="../demo-container-basic.svg"></div>

		<div id="gui">
			<button type="button" onclick="svgMap.zoomup()">Zoom +</button>
			<button type="button" onclick="svgMap.zoomdown()">Zoom -</button>
			<button type="button" onclick="svgMap.gps()">GPS</button>
			<button type="button" onclick="svgMap.getBasicPermanentLink(true)">PermaLink</button>
		</div>
	</body>
</html>
