<?xml version="1.0" encoding="UTF-8"?>
<!--
	Demo container SVG for svgmapjs (this fork)
	- Container-style root (like svgmapAppLayers Container.svg)
	- Layers are imported via <animation xlink:href="...">
	License: MPL-2.0 (same as this repository)
-->
<svg
	xmlns="http://www.w3.org/2000/svg"
	xmlns:xlink="http://www.w3.org/1999/xlink"
	xmlns:go="http://purl.org/svgmap/profile"
	viewBox="13500 -3375 1125 1125"
	go:dataArea="13500 -3375 1125 1125"
>
	<metadata>
		<rdf:RDF
			xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
			xmlns:crs="http://opengis.org/xmldtds/transformations.dtd"
			xmlns:svg="http://www.w3.org/svg"
		>
			<rdf:Description>
				<crs:CoordinateReferenceSystem
					rdf:resource="http://purl.org/crs/84"
					svg:transform="matrix(100,0,0,-100,0,0)"
				/>
			</rdf:Description>
		</rdf:RDF>
	</metadata>
	<globalCoordinateSystem
		srsName="http://purl.org/crs/84"
		transform="matrix(100,0,0,-100,0,0)"
	/>

	<!-- Base map layer -->
	<animation
		x="13500"
		y="-3375"
		width="1125"
		height="1125"
		xlink:href="./layers/demo-root.svg"
		title="Demo base"
		class="basemap switch"
		visibility="visible"
	/>

	<!-- WebApp layer demo (controller is declared on this root container layer element) -->
	<animation
		x="13500"
		y="-3375"
		width="1125"
		height="1125"
		xlink:href="./layers/demo-webapp-layer.svg"
		title="WebApp layer demo"
		class="overlay"
		visibility="visible"
	/>
</svg>
